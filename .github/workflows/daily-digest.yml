name: Daily Digest Pipeline

on:
  schedule:
    # UTC 22:00 = Beijing 06:00, US East 18:00, US West 15:00
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: "Specific channel ID (leave empty for all)"
        required: false
      date:
        description: "Date override (YYYY-MM-DD, leave empty for today)"
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.channel }}" ]; then
            ARGS="$ARGS --channel ${{ github.event.inputs.channel }}"
          fi
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          npx tsx pipeline/run.ts $ARGS --agents gemini --model gemini

      - name: Commit and push new data
        run: |
          git config user.name "Daily Digest Bot"
          git config user.email "bot@daily-digest.local"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data generated."
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "daily digest: ${DATE}"
            git push
          fi
